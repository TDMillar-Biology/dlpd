executor: slurm
jobs: 11
latency-wait: 120

# This must be a mapping (key: value), not a list (-)
default-resources:
  slurm_account: !!str "132714815093"
  slurm_partition: "medium"
  mem_mb: 16000
  runtime: 60

# Note: The 'slurm:' block is often ignored by the new plugin 
# if not nested under 'default-resources' or 'retries'
